---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: host-networking
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      name: udp
      port: 53
      protocol: UDP
    - allowedRoutes:
        namespaces:
          from: Same
      name: tcp
      port: 53
      protocol: TCP
    - allowedRoutes:
        namespaces:
          from: Same
      name: http
      port: 80
      protocol: HTTP
status:
  conditions:
    - message: Gateway has unsupported listeners
      reason: ListenersNotValid
      status: "True"
      type: Accepted
      lastTransitionTime: "2026-02-28T00:00:00Z"
    - message: Gateway waiting for address
      reason: AddressNotAssigned
      status: "False"
      type: Programmed
      lastTransitionTime: "2026-02-28T00:00:00Z"
  listeners:
    - attachedRoutes: 0
      conditions:
        - message: Listener not valid. UDP listeners are not supported when Gateway API Host Network mode is enabled
          reason: UnsupportedProtocol
          status: "False"
          type: Accepted
          lastTransitionTime: "2026-02-28T00:00:00Z"
        - message: Address not ready yet
          reason: Pending
          status: "False"
          type: Programmed
          lastTransitionTime: "2026-02-28T00:00:00Z"
      name: udp
    - attachedRoutes: 0
      conditions:
        - message: Listener not valid. TCP listeners are not supported when Gateway API Host Network mode is enabled
          reason: UnsupportedProtocol
          status: "False"
          type: Accepted
          lastTransitionTime: "2026-02-28T00:00:00Z"
        - message: Address not ready yet
          reason: Pending
          status: "False"
          type: Programmed
          lastTransitionTime: "2026-02-28T00:00:00Z"
      name: tcp
    - attachedRoutes: 1
      conditions:
        - lastTransitionTime: "2025-07-01T05:06:15Z"
          message: Resolved Refs
          reason: ResolvedRefs
          status: "True"
          type: ResolvedRefs
        - lastTransitionTime: "2025-07-01T14:19:43Z"
          message: Listener Accepted
          reason: Accepted
          status: "True"
          type: Accepted
        - lastTransitionTime: "2025-07-01T14:29:32Z"
          message: Address not ready yet
          reason: Pending
          status: "False"
          type: Programmed
      name: http
      supportedKinds:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
