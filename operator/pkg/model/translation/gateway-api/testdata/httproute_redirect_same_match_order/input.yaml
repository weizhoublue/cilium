http:
- hostname: '*'
  name: http
  port: 80
  routes:
  - backends:
    - name: infra-backend-v1
      namespace: gateway-conformance-infra
      port:
        port: 8080
    path_match:
      prefix: /same-match
    timeout: {}
  - path_match:
      prefix: /same-match
    request_redirect:
      scheme: https
      status_code: 302
    timeout: {}
  sources:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: same-namespace
    namespace: gateway-conformance-infra
    version: v1
