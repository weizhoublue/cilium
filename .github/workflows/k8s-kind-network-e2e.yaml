name: Installation and Conformance Test

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      UID:
        description: "A second number, to differentiate multiple runs of the same workflow by the same PR"
        required: false
        default: 1
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  push:
    branches:
      - main
      - ft/main/**

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with cilium/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write
  # To be able to request the JWT from GitHub's OIDC provider
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.PR-number || github.event.after }}
  cancel-in-progress: true

env:
  cluster_name: cilium-testing

jobs:
  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: cilium/cilium/.github/actions/set-commit-status@main # main
        with:
          sha: ${{ inputs.SHA || github.sha }}

  kubernetes-e2e:
    name: K8s Network E2E tests
    runs-on: ${{ vars.GH_RUNNER_EXTRA_POWER_UBUNTU_LATEST || 'ubuntu-24.04' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # TODO add "ipv6", "ipv6" fails to install cilium
        ipFamily: ["dual"]
    env:
      IP_FAMILY: ${{ matrix.ipFamily }}
      job_name: "Installation and Conformance Test"

    steps:
      - name: Collect Workflow Telemetry
        uses: cilium/workflow-telemetry-action@b1a318f80a08acede58027afe1455d037379966f # v2.2.0
        with:
          comment_on_pr: false

      - name: Checkout code (trusted)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.context-ref || github.event.repository.default_branch }}

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Enable ipv4 and ipv6 forwarding
        run: |
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo sysctl -w net.ipv4.ip_forward=1

      - name: Set up environment (download Kubernetes dependencies)
        run: |
          TMP_DIR=$(mktemp -d)
          # Test binaries. The e2e.test/ginkgo pair is pulled from
          # v1.37.0-beta.0 rather than the cluster's KIND_K8S_VERSION
          # (v1.36.0) to pick up upstream commit 108da50828f, which stops
          # the UDP Conntrack client probe from crash-looping. The cluster
          # (KIND_K8S_IMAGE) and kubectl stay on v1.36.0.
          E2E_TEST_VERSION="v1.37.0-beta.0"
          curl -fL --retry 5 --retry-all-errors --retry-delay 3 https://dl.k8s.io/${E2E_TEST_VERSION}/kubernetes-test-linux-amd64.tar.gz -o ${TMP_DIR}/kubernetes-test-linux-amd64.tar.gz
          tar -xvzf ${TMP_DIR}/kubernetes-test-linux-amd64.tar.gz \
            --directory ${TMP_DIR} \
            --strip-components=3 kubernetes/test/bin/ginkgo kubernetes/test/bin/e2e.test
          # kubectl
          curl -fL --retry 5 --retry-all-errors --retry-delay 3 https://dl.k8s.io/${{ env.KIND_K8S_VERSION }}/bin/linux/amd64/kubectl -o ${TMP_DIR}/kubectl
          # kind
          curl -fLo ${TMP_DIR}/kind --retry 5 --retry-all-errors --retry-delay 3 https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          # Install
          sudo cp ${TMP_DIR}/ginkgo /usr/local/bin/ginkgo
          sudo cp ${TMP_DIR}/e2e.test /usr/local/bin/e2e.test
          sudo cp ${TMP_DIR}/kubectl /usr/local/bin/kubectl
          sudo cp ${TMP_DIR}/kind /usr/local/bin/kind
          sudo chmod +x /usr/local/bin/ginkgo /usr/local/bin/e2e.test /usr/local/bin/kubectl /usr/local/bin/kind
          sudo rm -rf ${TMP_DIR}

      - name: Create multi node cluster
        run: |
          cat <<EOF | /usr/local/bin/kind create cluster \
            --name ${{ env.cluster_name}}           \
            --image ${{ env.KIND_K8S_IMAGE }}  \
            -v7 --retain --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            ipFamily: ${IP_FAMILY}
            kubeProxyMode: "none"
            disableDefaultCNI: true
          nodes:
          - role: control-plane
          - role: control-plane
          - role: worker
          - role: worker
          EOF

      - name: Workaround CoreDNS for IPv6 airgapped
        if: ${{ matrix.ipFamily == 'ipv6' }}
        run: |
          # Patch CoreDNS to work in Github CI
          # 1. Github CI doesn´t offer IPv6 connectivity, so CoreDNS should be configured
          # to work in an offline environment:
          # https://github.com/coredns/coredns/issues/2494#issuecomment-457215452
          # 2. Github CI adds following domains to resolv.conf search field:
          # .net.
          # CoreDNS should handle those domains and answer with NXDOMAIN instead of SERVFAIL
          # otherwise pods stops trying to resolve the domain.
          # Get the current config
          original_coredns=$(/usr/local/bin/kubectl get -oyaml -n=kube-system configmap/coredns)
          echo "Original CoreDNS config:"
          echo "${original_coredns}"
          # Patch it
          fixed_coredns=$(
            printf '%s' "${original_coredns}" | sed \
              -e 's/^.*kubernetes cluster\.local/& net/' \
              -e '/^.*upstream$/d' \
              -e '/^.*fallthrough.*$/d' \
              -e '/^.*forward . \/etc\/resolv.conf$/d' \
              -e '/^.*loop$/d' \
          )
          echo "Patched CoreDNS config:"
          echo "${fixed_coredns}"
          printf '%s' "${fixed_coredns}" | /usr/local/bin/kubectl apply -f -

      - name: Get Cilium's default values
        id: default_vars
        uses: ./.github/actions/helm-default
        with:
          image-tag: ${{ inputs.SHA || github.sha }}
          registry_host: ${{ vars.DOCKER_READ_HOST }}
          registry_organization: ${{ vars.DOCKER_READ_ORG }}
          image-pull-secret: "cilium-registry"
          chart-dir: ./untrusted/install/kubernetes/cilium

      - name: Set up job variables
        id: vars
        run: |
          # Note: On Kind, we install Cilium with HostPort (portmap CNI chaining) enabled,
          # to ensure coverage of that feature in cilium connectivity test
          CILIUM_INSTALL_DEFAULTS="${{ steps.default_vars.outputs.cilium_install_defaults }} \
            --helm-set=cni.chainingMode=portmap \
            --helm-set-string=kubeProxyReplacement=true"
          if [ "${IP_FAMILY}" == "dual" ]; then
            CILIUM_INSTALL_DEFAULTS="${CILIUM_INSTALL_DEFAULTS} --helm-set=ipv6.enabled=true"
          fi
          echo cilium_install_defaults=${CILIUM_INSTALL_DEFAULTS} >> $GITHUB_OUTPUT
          echo sha=${{ steps.default_vars.outputs.sha }} >> $GITHUB_OUTPUT

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@fc661364dd4962fb50f6415216d5f6edbfa6a822 # v0.19.6
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}
          repository: ${{ env.CILIUM_CLI_RELEASE_REPO }}
          release-version: ${{ env.CILIUM_CLI_VERSION }}

      - name: Create imagePullSecret
        if: ${{ vars.DOCKER_AUTH_REQUIRED == 'true' }}
        run: |
          kubectl create secret docker-registry cilium-registry \
            --namespace kube-system \
            --docker-server=${{ vars.DOCKER_READ_HOST }} \
            --docker-username="${{ vars.DOCKER_READ_USERNAME }}" \
            --docker-password="${{ secrets.DOCKER_READ_PASSWORD }}"

      - name: Wait for images to be available
        timeout-minutes: 30
        uses: ./.github/actions/wait-for-images
        with:
          SHA: ${{ steps.vars.outputs.sha }}
          images: cilium-ci operator-generic-ci hubble-relay-ci
          login-host: ${{ vars.DOCKER_READ_HOST }}
          login-username: ${{ vars.DOCKER_READ_USERNAME }}
          login-password: ${{ secrets.DOCKER_READ_PASSWORD }}
          auth-required: ${{ vars.DOCKER_AUTH_REQUIRED }}

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.vars.outputs.sha }}
          persist-credentials: false
          # Required by checkout v7+ to fetch fork PR code; see the NOT TRUSTED warning above.
          allow-unsafe-pr-checkout: true
          path: untrusted
          sparse-checkout: |
            install/kubernetes/cilium

      - name: Install Cilium
        id: install-cilium
        run: |
          getKubeApiServerAddress() {
            nodev4=$(kubectl get node $1 -o json | jq -r '.status.addresses[] | select(.type=="InternalIP") | .address' | head -n 1)
            echo $nodev4
          }
          node1=$(getKubeApiServerAddress ${{ env.cluster_name }}-control-plane)
          node2=$(getKubeApiServerAddress ${{ env.cluster_name }}-control-plane2)

          cilium install --wait ${{ steps.vars.outputs.cilium_install_defaults }} \
          --helm-set kubeProxyReplacement=true \
          --helm-set k8s.apiServerURLs="https://$node1:6443 https://$node2:6443"

      - name: Create LB IPAM pool
        run: |
          # Needed so that Cilium can allocate LoadBalancer service IPs
          # needed for the tests
          kubectl apply -f - <<EOF
          apiVersion: "cilium.io/v2"
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: "test-lb-pool"
          spec:
            blocks:
            - cidr: "10.0.10.0/24"
          EOF

      - name: Run Kubernetes sig-network test
        id: run-tests
        run: |
          # output_dir
          mkdir -p _artifacts

          # get kubeconfig to pass to the e2e binary
          kind get kubeconfig --name ${{ env.cluster_name }} > _artifacts/kubeconfig.conf

          # Kubernetes e2e tests use ginkgo and tags to select the tests that should run based on two regex, focus and skip:
          # Focus tests:
          # \[sig-network\]: sig-network tests are defined by sig-network to guarantee a consistent behavior on all the the k8s network implementations
          # Skipped tests:
          # Disruptive|Serial : require to run in serial and perform disruptive operations on clusters (reboots, ...)
          # Federation|PerformanceDNS : unrelated sig-network tests
          # Alpha|Beta|Experimental : skip features that are not GA
          # KubeProxy|kube-proxy : kube-proxy specifics
          # LoadBalancer|GCE|ExternalIP : require a cloud provider, some of them are GCE specifics
          # Netpol|NetworkPolicy : network policies, demand significant resources and use to be slow, better to run in a different job
          # rejected : Kubernetes expect Services without endpoints associated to REJECT the connection to notify the client, Cilium silently drops the packet
          # externalTrafficPolicy : Cilium fails externalTrafficPolicy=local test, see https://github.com/cilium/cilium/issues/37613
          # DualStack : tests that are dual stack specific
          # IPv6 : tests that are IPv6 specific

          SKIP_FLAG="Alpha|Beta|Experimental|Federation|PerformanceDNS|Disruptive|Serial|KubeProxy|kube-proxy|ExternalIP|LoadBalancer|GCE|Netpol|NetworkPolicy|rejected|externalTrafficPolicy|SCTPConnectivity|IPv6DualStack|Conntrack.proxy.implementation.should.not.be.vulnerable.to.the.invalid.conntrack.state.bug|Services.should.fallback.to.local.terminating.endpoints.when.there.are.no.ready.endpoints.with.internalTrafficPolicy=Local|Networking.IPerf2.\[Feature:Networking\-Performance\].should.run.iperf2|Networking.Granular.Checks:.Services.should.update.endpoints"
          if [ "${IP_FAMILY}" != "dual" ]; then
            SKIP_FLAG="${SKIP_FLAG}|DualStack"
          fi
          if [ "${IP_FAMILY}" == "ipv4" ]; then
            SKIP_FLAG="${SKIP_FLAG}|IPv6"
          fi

          # Run tests
          export KUBERNETES_CONFORMANCE_TEST='y'
          export E2E_REPORT_DIR=${PWD}/_artifacts
          # 25-way parallelism on the 4-vCPU runner starves endpoint
          # regeneration, so pod CNI ADD takes an endpoint-create 429 and
          # pods come up late or without an IP, flaking sig-network specs.
          # Lower the parallelism to ease that pressure. Match the
          # network-policies job at 10.
          /usr/local/bin/ginkgo --nodes=10                \
            --focus="\[sig-network\]"     \
            --skip="${SKIP_FLAG}"   \
            /usr/local/bin/e2e.test                       \
            --                                            \
            --kubeconfig=${PWD}/_artifacts/kubeconfig.conf     \
            --provider=local                              \
            --dump-logs-on-failure=true                   \
            --report-dir=${E2E_REPORT_DIR}                \
            --disable-log-dump=true                       \
            --delete-namespace-on-failure=false

      # Sequentially kill kube-apiserver pods to verify cilium agent pods fail over to an active instance.
      - name: Test kube-apiserver high availability
        timeout-minutes: 10
        run: |
          PORT=6443
          NAMESPACE="kube-system"
          # Get kube-apiserver pods.
          declare -A pods
          entries=$(kubectl -n "$NAMESPACE" get pods -l component=kube-apiserver -o json | jq -r '.items[] | "\(.metadata.name) \(.status.podIP)"')
          while read -r pod ip; do
            pods["$pod"]="$ip"
            done <<< "$entries"
          for pod in "${!pods[@]}"; do
            echo "$pod => ${pods[$pod]}"
          done
          # Sequentially delete kube-apiserver pods by connecting via an active kube-apiserver instance.
          for pod in "${!pods[@]}"; do
            # Find an active kube-apiserver pod
            for active_pod in "${!pods[@]}"; do
              if [[ "$active_pod" != "$pod" ]]; then
                active_ip="${pods[$active_pod]}"
                break
              fi
            done
            echo "Deleting $pod"
            kubectl -n "$NAMESPACE" --server "https://${active_ip}:${PORT}" delete pod "$pod"
            sleep 120
          done
          cilium status --wait --wait-duration=5m
          kubectl get pods -n kube-system

      - name: Gather metrics
        uses: ./.github/actions/gather-metrics
        with:
          job: "${{ env.job_name }}-${{ matrix.ipFamily }}"

      - name: Create Cilium JUnits Directory
        # always() so the JUnit report produced by the sig-network run is moved
        # into place (and uploaded by the common post steps) even when the tests
        # fail, which is exactly when the report is needed to know which spec
        # failed.
        if: ${{ always() && steps.install-cilium.outcome != 'skipped' && steps.run-tests.outcome != 'skipped' }}
        run: |
          # Move the all artifacts to cilium-junits directory since that's the
          # directory used in the common post steps.
          mv _artifacts cilium-junits

      - name: Post-test information gathering
        if: ${{ !success() && steps.install-cilium.outcome != 'skipped' }}
        run: |
          mkdir -p ./_artifacts/logs

          # The sig-network run keeps failed specs' namespaces alive
          # (--delete-namespace-on-failure=false), so capture per-pod state
          # before the kind export tears the cluster down. This is where the
          # sig-network Conntrack UDP NodePort failure lives: the client probe
          # pod (pod-client) has been observed crash-looping during the
          # backend poll window, and namespace teardown plus --disable-log-dump
          # previously destroyed the evidence (lastState.terminated exit code
          # /reason and the --previous container stdout that shows whether the
          # nc loop ran to completion) needed to tell a client-pod crash apart
          # from a real datapath regression.
          kubectl get pods -A -o wide > ./_artifacts/logs/pods-wide.txt 2>&1
          kubectl get pods -A -o yaml > ./_artifacts/logs/pods.yaml 2>&1
          kubectl get events -A --sort-by=.lastTimestamp > ./_artifacts/logs/events.txt 2>&1

          # For every pod left behind in a sig-network test namespace, dump the
          # describe output, current logs and previous-container logs so a
          # future occurrence is fully diagnosable.
          for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            case "$ns" in
              conntrack-*|services-*|nettest-*|network-*)
                nsdir="./_artifacts/logs/${ns}"
                mkdir -p "$nsdir"
                for pod in $(kubectl -n "$ns" get pods -o jsonpath='{.items[*].metadata.name}'); do
                  kubectl -n "$ns" describe pod "$pod" > "${nsdir}/${pod}.describe.txt" 2>&1
                  kubectl -n "$ns" logs "$pod" --all-containers=true > "${nsdir}/${pod}.log" 2>&1
                  kubectl -n "$ns" logs "$pod" --all-containers=true --previous > "${nsdir}/${pod}.previous.log" 2>&1
                done
                ;;
            esac
          done

          /usr/local/bin/kind export logs --name  ${{ env.cluster_name }} --verbosity=3 ./_artifacts/logs
        shell: bash {0} # Disable default fail-fast behaviour so that all commands run independently

      - name: Upload cluster logs
        if: ${{ !success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "kind-logs-${{ matrix.ipFamily }}"
          path: ./_artifacts/logs
          retention-days: 5

      - name: Run common post steps
        if: ${{ always() && steps.install-cilium.outcome != 'skipped' }}
        uses: ./.github/actions/post-logic
        with:
          artifacts_suffix: "${{ matrix.ipFamily }}"
          job_status: "${{ job.status }}"
          capture_features_tested: ${{ steps.run-tests.outcome != 'skipped' }}

  merge-upload-and-status:
    name: Merge Upload and Status
    if: ${{ always() }}
    needs: kubernetes-e2e
    uses: ./.github/workflows/common-post-jobs.yaml
    secrets: inherit
    with:
      context-ref: ${{ inputs.context-ref || github.sha }}
      sha: ${{ inputs.SHA || github.sha }}
      success: ${{ needs.kubernetes-e2e.result == 'success' }}
